<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>将棋 VS 囲碁</title>
<style>
  :root{
    --board:#d9b072;      /* 榧盤の木肌 */
    --board-dk:#c79a57;
    --line:#5b4327;       /* 盤の墨線 */
    --bg:#1a1714;         /* 背景・墨 */
    --bg2:#262019;
    --paper:#efe7d6;      /* 駒の地 */
    --sumi:#221b14;       /* 将棋＝墨 */
    --shu:#b23a2e;        /* 囲碁＝朱 */
    --shu-dk:#8a2a20;
    --gold:#d8b34a;
    --stone-b:#2a2522;    /* 黒石 */
    --txt:#efe7d6;
    --txt-dim:#a99c86;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    overscroll-behavior:none;}
  .wrap{max-width:560px;margin:0 auto;padding:14px 12px 32px;}

  header{display:flex;align-items:baseline;justify-content:center;gap:.5em;
    margin:6px 0 14px;}
  header .s{color:var(--sumi);background:var(--paper);padding:0 .35em;
    border-radius:3px;font-weight:700;letter-spacing:.05em;}
  header .vs{color:var(--gold);font-size:.7em;letter-spacing:.2em;font-style:italic;}
  header .g{color:var(--paper);background:var(--shu);padding:0 .35em;
    border-radius:3px;font-weight:700;letter-spacing:.05em;}
  header h1{font-size:clamp(20px,6vw,28px);margin:0;font-weight:700;}

  /* 手番表示 */
  .turn{display:flex;align-items:center;justify-content:center;gap:.6em;
    font-size:15px;min-height:30px;margin-bottom:10px;letter-spacing:.04em;}
  .turn .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
  .turn.shogi .dot{background:var(--sumi);border:1px solid #000;}
  .turn.igo .dot{background:var(--stone-b);box-shadow:inset 2px 2px 3px #555;}
  .turn b{font-size:17px;}
  .turn .shogi-c{color:var(--paper);}
  .turn .igo-c{color:var(--shu);}

  /* 盤 */
  .board-frame{background:linear-gradient(160deg,var(--board),var(--board-dk));
    border-radius:6px;padding:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.55),inset 0 0 0 2px #00000022;
    position:relative;}
  .board{position:relative;width:100%;aspect-ratio:1/1;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  .hit{position:absolute;inset:0;display:grid;
    grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);}
  .cell{position:relative;display:flex;align-items:center;justify-content:center;
    cursor:pointer;}
  .cell .piece, .cell .stone{pointer-events:none;}

  /* 将棋駒：五角形 */
  .piece{width:82%;height:82%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(170deg,#f3ecdb,#e2d4b6);
    color:var(--sumi);font-weight:700;
    font-size:clamp(11px,3.6vw,18px);line-height:1;text-align:center;
    clip-path:polygon(50% 2%,86% 22%,86% 98%,14% 98%,14% 22%);
    box-shadow:0 2px 3px rgba(0,0,0,.4);transition:transform .08s;}
  .piece.promoted{color:var(--shu);}
  .piece.king{background:linear-gradient(170deg,#f7eecb,#e8d49a);
    box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 0 1.5px var(--gold);}

  /* 囲碁陣営の駒：上下反転し、朱寄りの地で陣営を区別 */
  .piece.igo{transform:rotate(180deg);
    background:linear-gradient(170deg,#f0d9cf,#e0b3a4);color:var(--shu-dk);}
  .piece.igo.promoted{color:var(--sumi);}
  .piece.igo.king{background:linear-gradient(170deg,#f3ddc9,#e6b58c);
    box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 0 1.5px var(--gold);}
  .piece.igo.lift{transform:rotate(180deg) translateY(-6%) scale(1.04);}

  /* 碁石：円 */
  .stone{width:74%;height:74%;border-radius:50%;
    background:radial-gradient(circle at 34% 30%,#5a534d,#211d1a 70%);
    box-shadow:0 2px 4px rgba(0,0,0,.45);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(10px,3.2vw,16px);font-weight:700;}
  .stone.king{background:radial-gradient(circle at 34% 30%,#d56a5c,var(--shu-dk) 72%);
    box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 0 1.5px var(--gold);
    color:#fff5e8;}

  /* 選択・着手可能マーカー */
  .cell.sel::after{content:"";position:absolute;inset:6%;border-radius:4px;
    box-shadow:inset 0 0 0 3px var(--gold);}
  .cell.move::before{content:"";position:absolute;width:30%;height:30%;
    border-radius:50%;background:#3a7d3a99;}
  .cell.place:hover::before{content:"";position:absolute;width:50%;height:50%;
    border-radius:50%;background:#2a252299;}
  .piece.lift{transform:translateY(-6%) scale(1.04);}

  /* 持ち駒・捕獲表示 */
  .captives{display:flex;flex-wrap:wrap;gap:6px;min-height:34px;
    padding:6px 4px;font-size:13px;color:var(--txt-dim);align-items:center;}
  .captives .lab{flex:0 0 auto;color:var(--txt-dim);font-size:12px;letter-spacing:.08em;}
  .cap-chip{background:#00000033;border:1px solid #ffffff1a;border-radius:4px;
    padding:1px 7px;font-size:13px;}
  .cap-chip.shu{color:var(--shu);}
  .cap-chip.selable{cursor:pointer;border-color:#ffffff44;}
  .cap-chip.selable:hover{background:#00000055;}
  .cap-chip.sel{box-shadow:0 0 0 2px var(--gold);background:#00000066;}

  /* コントロール */
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;align-items:center;}
  button{font-family:inherit;background:var(--bg2);color:var(--txt);
    border:1px solid #ffffff22;border-radius:6px;padding:9px 14px;font-size:14px;
    cursor:pointer;letter-spacing:.04em;transition:background .12s;}
  button:hover{background:#332a20;}
  button:active{transform:translateY(1px);}
  button.primary{background:var(--shu);color:#fff;border-color:var(--shu-dk);}
  button.primary:hover{background:var(--shu-dk);}
  .opt{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--txt-dim);
    margin-left:auto;}
  .opt select{font-family:inherit;background:var(--bg2);color:var(--txt);
    border:1px solid #ffffff22;border-radius:5px;padding:6px 8px;font-size:13px;}

  /* メッセージ／勝敗 */
  .msg{margin-top:12px;min-height:22px;font-size:14px;color:var(--gold);
    text-align:center;letter-spacing:.04em;}

  .overlay{position:fixed;inset:0;background:#0c0a08e0;display:none;
    align-items:center;justify-content:center;z-index:20;}
  .overlay.show{display:flex;}
  .modal{background:linear-gradient(160deg,var(--bg2),#15110d);
    border:1px solid var(--gold);border-radius:10px;padding:30px 34px;
    text-align:center;max-width:340px;box-shadow:0 20px 60px #000;}
  .modal h2{margin:0 0 8px;font-size:26px;}
  .modal h2.shogi{color:var(--paper);}
  .modal h2.igo{color:var(--shu);}
  .modal p{color:var(--txt-dim);font-size:14px;margin:0 0 20px;}

  /* セットアップ案内 */
  .setup-note{background:#00000033;border:1px solid #ffffff14;border-radius:6px;
    padding:8px 12px;font-size:13px;color:var(--gold);text-align:center;
    margin-bottom:10px;letter-spacing:.03em;}
  .hide{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <header><h1><span class="s">将棋</span><span class="vs">VS</span><span class="g">囲碁</span></h1></header>

  <div id="setupNote" class="setup-note hide"></div>

  <div class="turn shogi" id="turnBar">
    <span class="dot"></span><span id="turnText">先手・将棋の番</span>
  </div>

  <div class="captives" id="shogiCaptured">
    <span class="lab">囲碁が取った駒（囲碁が打てる）</span>
  </div>

  <div class="board-frame">
    <div class="board">
      <canvas id="grid"></canvas>
      <div class="hit" id="hit"></div>
    </div>
  </div>

  <div class="captives" id="igoCaptured">
    <span class="lab">将棋が取った駒（将棋が打てる）</span>
  </div>

  <div class="controls">
    <button class="primary" id="resetBtn">対局をはじめる</button>
    <button id="undoBtn">一手戻す</button>
    <div class="opt">
      先手
      <select id="firstMove">
        <option value="S">将棋</option>
        <option value="G">囲碁</option>
      </select>
    </div>
    <div class="opt">
      囲碁の手数
      <select id="igoMoves">
        <option value="1">1手</option>
        <option value="2">2手</option>
        <option value="3">3手</option>
      </select>
    </div>
    <div class="opt">
      将棋
      <select id="shogiPlayer">
        <option value="human">人</option>
        <option value="cpu">CPU</option>
      </select>
    </div>
    <div class="opt">
      囲碁
      <select id="igoPlayer">
        <option value="human">人</option>
        <option value="cpu">CPU</option>
      </select>
    </div>
  </div>

  <div class="msg" id="msg"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="winTitle"></h2>
    <p id="winSub"></p>
    <button class="primary" id="againBtn">もう一局</button>
  </div>
</div>

<div class="overlay" id="promOverlay">
  <div class="modal">
    <h2 style="color:var(--gold);font-size:22px">成りますか？</h2>
    <p>この駒を成ることができます。</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="primary" id="promYes">成る</button>
      <button id="promNo">成らず</button>
    </div>
  </div>
</div>

<script>
/* ====== 盤モデル ======
   board[r][c] : null | {side:'S'|'G', type, promoted}
   side S = 将棋(駒)  side G = 囲碁(碁石)
   将棋の駒 type: K玉 R飛 B角 G金 S銀 N桂 L香 P歩
   囲碁の石 type: 'o'(普通の石) / 'K'(囲碁側の王)
*/
const N=9;
const KANJI={K:'玉',R:'飛',B:'角',G:'金',S:'銀',N:'桂',L:'香',P:'歩',
  R_:'龍',B_:'馬',S_:'全',N_:'圭',L_:'杏',P_:'と'};

let board, turn, igoMovesPerTurn, igoMovesLeft, sel, history, gameOver, setupPhase;

const grid=document.getElementById('grid');
const hit=document.getElementById('hit');
const ctx=grid.getContext('2d');

function initBoard(){
  board=Array.from({length:N},()=>Array(N).fill(null));
  // 将棋側を下(行8が一段目)に通常配置
  const back=['L','N','S','G','K','G','S','N','L'];
  for(let c=0;c<N;c++) board[8][c]={side:'S',type:back[c],promoted:false};
  board[7][1]={side:'S',type:'B',promoted:false}; // 角
  board[7][7]={side:'S',type:'R',promoted:false}; // 飛
  for(let c=0;c<N;c++) board[6][c]={side:'S',type:'P',promoted:false}; // 歩
  // 囲碁側：将棋の駒があるべき位置(上側の鏡像)に碁石を敷く
  for(let c=0;c<N;c++) board[0][c]={side:'G',type:'o'}; // 最奥列
  board[1][7]={side:'G',type:'o'}; // 角の鏡像位置
  board[1][1]={side:'G',type:'o'}; // 飛の鏡像位置
  for(let c=0;c<N;c++) board[2][c]={side:'G',type:'o'}; // 歩段の鏡像
  // 囲碁の王将だけ駒として固定配置（玉の鏡像位置 = 0段目中央 c=4 を石→王に置換）
  board[0][4]={side:'I',type:'K',promoted:false};
}

/* ---- 描画：盤線・星 ---- */
function sizeCanvas(){
  const rect=grid.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  grid.width=rect.width*dpr; grid.height=rect.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  drawGrid(rect.width,rect.height);
}
function drawGrid(w,h){
  ctx.clearRect(0,0,w,h);
  const cw=w/N, ch=h/N;
  ctx.strokeStyle=getCSS('--line'); ctx.lineWidth=1.2;
  for(let i=0;i<=N;i++){
    ctx.beginPath();ctx.moveTo(i*cw,0);ctx.lineTo(i*cw,h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*ch);ctx.lineTo(w,i*ch);ctx.stroke();
  }
  // 星
  ctx.fillStyle=getCSS('--line');
  [[2,2],[2,6],[6,2],[6,6],[4,4]].forEach(([r,c])=>{
    ctx.beginPath();ctx.arc((c+0.5)*cw,(r+0.5)*ch,2.6,0,7);ctx.fill();
  });
}
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

/* ---- セル描画 ---- */
function render(){
  hit.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.createElement('div');
    cell.className='cell'; cell.dataset.r=r; cell.dataset.c=c;
    const p=board[r][c];
    if(p){
      if(p.side==='S'||p.side==='I'){
        const el=document.createElement('div');
        el.className='piece'+(p.side==='I'?' igo':'')+(p.type==='K'?' king':'')+(p.promoted?' promoted':'');
        el.textContent=KANJI[p.promoted?p.type+'_':p.type];
        if(sel&&sel.r===r&&sel.c===c) el.classList.add('lift');
        cell.appendChild(el);
      }else{
        const el=document.createElement('div');
        el.className='stone';
        cell.appendChild(el);
      }
    }
    cell.addEventListener('click',()=>onCell(r,c));
    hit.appendChild(cell);
  }
  paintHints();
}

function paintHints(){
  const cells=hit.children;
  for(const cell of cells){cell.classList.remove('sel','move','place');}
  if(gameOver) return;
  if(sel){ // 駒を選択中（将棋・囲碁どちらの手番でも）
    const cell=[...cells].find(x=>+x.dataset.r===sel.r&&+x.dataset.c===sel.c);
    if(cell) cell.classList.add('sel');
    legalMoves(sel.r,sel.c).forEach(([r,c])=>{
      const t=[...cells].find(x=>+x.dataset.r===r&&+x.dataset.c===c);
      if(t) t.classList.add('move');
    });
  }
  if(turn==='G'&&!sel){ // 囲碁手番で駒未選択 → 空きマスは石置き候補
    for(const cell of cells){
      const r=+cell.dataset.r,c=+cell.dataset.c;
      if(!board[r][c]) cell.classList.add('place');
    }
  }
}

/* ====== 将棋の動き ====== */
const DIR={
  up:[-1,0],dn:[1,0],lf:[0,-1],rt:[0,1],
  ul:[-1,-1],ur:[-1,1],dl:[1,-1],dr:[1,1]
};
function legalMoves(r,c){
  const p=board[r][c]; if(!p||(p.side!=='S'&&p.side!=='I')) return [];
  const mine=p.side;                 // 自陣営
  const fwd=(mine==='S')?-1:1;        // 将棋は上(-1)、囲碁陣営は下(+1)が前
  const moves=[];
  const blocked=(t)=>t&&(t.side===mine); // 自陣営の駒には進めない（碁石side Gは敵対物＝進める）
  const step=(dr,dc)=>{const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=N||nc<0||nc>=N) return;
    if(blocked(board[nr][nc])) return;
    moves.push([nr,nc]);
  };
  const slide=(dr,dc)=>{let nr=r+dr,nc=c+dc;
    while(nr>=0&&nr<N&&nc>=0&&nc<N){
      const t=board[nr][nc];
      if(blocked(t)) break;
      moves.push([nr,nc]);
      if(t) break; // 碁石・敵駒で止まる（そこを取れる）
      nr+=dr;nc+=dc;
    }
  };
  const type=p.type, pr=p.promoted;
  const goldMoves=()=>{ step(fwd,0);step(fwd,-1);step(fwd,1);step(0,-1);step(0,1);step(-fwd,0); };
  if(type==='K'){for(const k in DIR)step(...DIR[k]);}
  else if(type==='R'){slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);
    if(pr){step(-1,-1);step(-1,1);step(1,-1);step(1,1);}}
  else if(type==='B'){slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);
    if(pr){step(-1,0);step(1,0);step(0,-1);step(0,1);}}
  else if(type==='G'||(pr&&(type==='S'||type==='N'||type==='L'||type==='P'))){goldMoves();}
  else if(type==='S'){step(fwd,0);step(fwd,-1);step(fwd,1);step(-fwd,-1);step(-fwd,1);}
  else if(type==='N'){step(2*fwd,-1);step(2*fwd,1);}
  else if(type==='L'){slide(fwd,0);}
  else if(type==='P'){step(fwd,0);}
  return moves;
}

/* ====== 操作 ====== */
function onCell(r,c){
  if(gameOver) return;
  if(pendingProm) return; // 成り選択中は操作不可
  if(players[turn]==='cpu') return; // CPUの手番中は操作不可
  const p=board[r][c];
  // 持ち駒を打つモード
  if(dropSel){
    if(p){ setMsg('空きマスにのみ打てます。'); return; }
    if(dropSel.side==='S'&&turn==='S'){ doShogiDrop(r,c); return; }
    if(dropSel.side==='G'&&turn==='G'){ doIgoDrop(r,c); return; }
    return;
  }
  if(turn==='S'){
    if(sel){
      const ok=legalMoves(sel.r,sel.c).some(([mr,mc])=>mr===r&&mc===c);
      if(ok){ doPieceMove(sel.r,sel.c,r,c); return; }
    }
    if(p&&p.side==='S'){ sel={r,c}; paintHints(); }
    else { sel=null; paintHints(); }
  } else { // 囲碁の手番：駒移動 or 石置き
    if(sel){
      const ok=legalMoves(sel.r,sel.c).some(([mr,mc])=>mr===r&&mc===c);
      if(ok){ doPieceMove(sel.r,sel.c,r,c); return; }
    }
    if(p&&p.side==='I'){ sel={r,c}; paintHints(); return; } // 囲碁の駒を選択
    if(p){ sel=null; paintHints(); return; }                // 他の駒/石は無視
    doIgoPlace(r,c);                                          // 空きマス＝石を置く
  }
}

function doPieceMove(fr,fc,tr,tc){
  pushHistory();
  const p=board[fr][fc];
  const mine=p.side;                 // 'S' or 'I'
  const enemy=(mine==='S')?'I':'S';
  const target=board[tr][tc];
  if(target){
    if(target.side==='G'){ /* 碁石を踏む：盤から除去のみ、持ち駒にはしない */ }
    else if(target.side===enemy){ // 敵陣営の駒を取る
      if(target.type==='K'){ // 相手の王を取った＝勝ち
        board[fr][fc]=null; board[tr][tc]=p;
        finish(mine); render(); return;
      }
      // 取った駒は自陣の持ち駒へ（成り解除）
      if(mine==='S') captured.shogiPieces.push(target.type);
      else           captured.igoPieces.push(target.type);
    }
  }
  board[fr][fc]=null;
  board[tr][tc]=p;
  sel=null;
  // 成り判定：移動元または移動先が敵陣3段にあり、成れる駒で未成りなら権利発生
  const promZone=(row)=> (mine==='S') ? (row<=2) : (row>=6);
  const canPromoteType=['R','B','S','N','L','P'].includes(p.type);
  const eligible = canPromoteType && !p.promoted && (promZone(tr)||promZone(fr));
  if(eligible){
    if(mustPromote(p,tr,mine)){            // 行き場なし → 強制成り
      p.promoted=true;
      finalizeMove(mine);
    } else if(players[mine]==='cpu'){       // CPUは常に成る（1段階）
      p.promoted=true;
      finalizeMove(mine);
    } else {                                // 人間 → 選択ダイアログ
      askPromotion(tr,tc,mine);
      return; // 確定はダイアログのコールバックで
    }
  } else {
    finalizeMove(mine);
  }
}

/* 移動先で「もう前進できない＝行き場なし」かを判定（強制成り対象） */
function mustPromote(p,tr,mine){
  if(p.promoted) return false;
  const lastRow   = (mine==='S')?0:8;        // 最奥列
  const last2Row  = (mine==='S')?1:7;        // 最奥の1つ手前
  if(p.type==='P'||p.type==='L'){ return tr===lastRow; }      // 歩・香：最奥で行き場なし
  if(p.type==='N'){ return tr===lastRow||tr===last2Row; }      // 桂：最奥2列で行き場なし
  return false;
}

/* 手番を確定して次へ進める（成り処理後に必ず呼ぶ） */
function finalizeMove(mine){
  if(mine==='S'){ turn='G'; igoMovesLeft=igoMovesPerTurn; }
  else { igoMovesLeft--; if(igoMovesLeft<=0) turn='S'; }
  updateTurnBar(); render(); setMsg('');
  scheduleCPU();
}

/* 成り確認ダイアログを表示。選択でpromoted確定→finalizeMove */
let pendingProm=null; // {tr,tc,mine}
function askPromotion(tr,tc,mine){
  pendingProm={tr,tc,mine};
  render(); // 駒を成る前の状態で一旦描画
  const ov=document.getElementById('promOverlay');
  ov.classList.add('show');
}
function resolvePromotion(doProm){
  if(!pendingProm) return;
  const {tr,tc,mine}=pendingProm;
  const p=board[tr][tc];
  if(p && doProm) p.promoted=true;
  pendingProm=null;
  document.getElementById('promOverlay').classList.remove('show');
  finalizeMove(mine);
}

function doIgoPlace(r,c){
  pushHistory();
  board[r][c]={side:'G',type:'o'};
  // 置いた石に隣接する「将棋陣営の駒」の包囲判定（囲碁陣営の駒は囲み取りの対象外）
  const taken=checkCaptures(r,c);
  if(taken.length){
    let kingTaken=false;
    taken.forEach(([tr,tc])=>{
      const pc=board[tr][tc];
      captured.igoPieces.push(pc.type); // 囲碁の持ち駒へ（成り解除）
      if(pc.type==='K') kingTaken=true;
      board[tr][tc]=null;
    });
    if(kingTaken){ render(); finish('G'); return; }
    setMsg(taken.length+'枚の駒を取りました。');
  }
  igoMovesLeft--;
  if(igoMovesLeft<=0){ turn='S'; }
  updateTurnBar(); render();
  scheduleCPU();
}

/* 将棋の持ち駒（囲碁から取った駒）を将棋陣営の駒として打つ（1手消費） */
function doShogiDrop(r,c){
  pushHistory();
  const type=captured.shogiPieces.splice(dropSel.idx,1)[0];
  board[r][c]={side:'S',type,promoted:false};
  dropSel=null;
  turn='G'; igoMovesLeft=igoMovesPerTurn;
  updateTurnBar(); render(); setMsg('駒を打ちました。');
  scheduleCPU();
}

/* 囲碁の持ち駒（将棋から取った駒）を囲碁陣営の駒として打つ（1手消費） */
function doIgoDrop(r,c){
  pushHistory();
  const type=captured.igoPieces.splice(dropSel.idx,1)[0];
  board[r][c]={side:'I',type,promoted:false};
  dropSel=null;
  igoMovesLeft--;
  if(igoMovesLeft<=0){ turn='S'; }
  updateTurnBar(); render(); setMsg('囲碁陣営の駒を打ちました。');
  scheduleCPU();
}
/* 石を(pr,pc)に置いた後、隣接する将棋駒の連を調べ、呼吸点ゼロの連をまとめて取り対象に */
function checkCaptures(pr,pc){
  const takenSet=new Map(); // "r,c" -> [r,c] 重複排除
  const neigh=[[pr-1,pc],[pr+1,pc],[pr,pc-1],[pr,pc+1]];
  for(const [r,c] of neigh){
    if(r<0||r>=N||c<0||c>=N) continue;
    const p=board[r][c];
    if(p&&p.side==='S'){
      const group=collectGroup(r,c);          // この駒が属する将棋駒の連
      if(!hasLiberty(group)){                  // 呼吸点ゼロなら連ごと取り
        for(const [gr,gc] of group) takenSet.set(gr+','+gc,[gr,gc]);
      }
    }
  }
  return [...takenSet.values()];
}

/* (r,c)の将棋駒から上下左右に連結した将棋駒の塊を返す */
function collectGroup(r,c){
  const group=[]; const seen=new Set(); const stack=[[r,c]];
  while(stack.length){
    const [cr,cc]=stack.pop();
    const key=cr+','+cc;
    if(seen.has(key)) continue;
    seen.add(key);
    const p=board[cr][cc];
    if(!p||p.side!=='S') continue;
    group.push([cr,cc]);
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=cr+dr,nc=cc+dc;
      if(nr<0||nr>=N||nc<0||nc>=N) continue;
      const np=board[nr][nc];
      if(np&&np.side==='S'&&!seen.has(nr+','+nc)) stack.push([nr,nc]);
    }
  }
  return group;
}

/* 連が呼吸点（隣接する空きマス）を1つでも持つか */
function hasLiberty(group){
  for(const [r,c] of group){
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=N||nc<0||nc>=N) continue; // 壁は呼吸点でない
      if(board[nr][nc]===null) return true;  // 空点があれば生きている
    }
  }
  return false;
}

/* 単独駒の囲み判定（CPUの評価などで使用）：連単位で呼吸点ゼロか */
function isSurrounded(r,c){
  const p=board[r][c];
  if(!p||p.side!=='S') return false;
  return !hasLiberty(collectGroup(r,c));
}

/* ====== 補助 ====== */
let captured={igoPieces:[],shogiPieces:[]}; // igoPieces=囲碁が取った将棋駒 / shogiPieces=将棋が取った囲碁駒
let dropSel=null; // 打とうとしている持ち駒 {side:'S'|'G', idx}
function pieceFace(t){return KANJI[t];}
function renderCaptured(){
  const sg=document.getElementById('shogiCaptured'); // 上：囲碁が取った駒（囲碁が打てる）
  const ig=document.getElementById('igoCaptured');   // 下：将棋が取った駒（将棋が打てる）
  sg.innerHTML='<span class="lab">囲碁が取った駒（囲碁が打てる）</span>'+
    captured.igoPieces.map((t,i)=>{
      const selable=(turn==='G'&&!setupPhase&&!gameOver);
      const isSel=dropSel&&dropSel.side==='G'&&dropSel.idx===i;
      return `<span class="cap-chip shu${selable?' selable':''}${isSel?' sel':''}" data-side="G" data-idx="${i}">${pieceFace(t)}</span>`;
    }).join('');
  ig.innerHTML='<span class="lab">将棋が取った駒（将棋が打てる）</span>'+
    captured.shogiPieces.map((t,i)=>{
      const selable=(turn==='S'&&!setupPhase&&!gameOver);
      const isSel=dropSel&&dropSel.side==='S'&&dropSel.idx===i;
      return `<span class="cap-chip${selable?' selable':''}${isSel?' sel':''}" data-side="S" data-idx="${i}">${pieceFace(t)}</span>`;
    }).join('');
  [...sg.querySelectorAll('.cap-chip'),...ig.querySelectorAll('.cap-chip')].forEach(chip=>{
    chip.addEventListener('click',()=>onChip(chip.dataset.side,+chip.dataset.idx));
  });
}
function onChip(side,idx){
  if(gameOver) return;
  if(players[turn]==='cpu') return;
  if(side!==turn) return; // 自分の手番の持ち駒のみ
  if(dropSel&&dropSel.side===side&&dropSel.idx===idx){ dropSel=null; } // 解除
  else { dropSel={side,idx}; sel=null; }
  updateTurnBar(); render();
  setMsg(dropSel?'打つ場所（空きマス）を選んでください。もう一度押すと解除。':'');
}
function updateTurnBar(){
  renderCaptured();
  const bar=document.getElementById('turnBar');
  const txt=document.getElementById('turnText');
  if(turn==='S'){ bar.className='turn shogi';
    txt.innerHTML='<span class="shogi-c"><b>将棋</b>の番</span>'; }
  else { bar.className='turn igo';
    const left=igoMovesPerTurn>1?`（残り${igoMovesLeft}手）`:'';
    txt.innerHTML=`<span class="igo-c"><b>囲碁</b>の番${left}</span>`; }
}
function setMsg(t){document.getElementById('msg').textContent=t;}

function finish(winner){
  gameOver=true; sel=null; render();
  const ov=document.getElementById('overlay');
  const tt=document.getElementById('winTitle');
  const sb=document.getElementById('winSub');
  if(winner==='S'){tt.textContent='将棋の勝ち';tt.className='shogi';
    sb.textContent='囲碁の王を討ち取りました。';}
  else{tt.textContent='囲碁の勝ち';tt.className='igo';
    sb.textContent='将棋の玉を討ち取りました。';}
  ov.classList.add('show');
}

/* ====== CPU（1段階：先読みなしの優先順位ルール） ====== */
const PIECE_VAL={K:1000,R:11,B:10,G:7,S:6,N:4,L:4,P:1};
let players={S:'human',G:'human'}; // 'human' | 'cpu'

function isCPUTurn(){ return !gameOver && players[turn]==='cpu'; }

// 盤上の自陣営の駒(side記号)を列挙
function piecesOf(side){
  const out=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const p=board[r][c]; if(p&&p.side===side) out.push({r,c,p});
  }
  return out;
}
// 空きマス列挙
function emptyCells(){
  const out=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(!board[r][c]) out.push([r,c]);
  return out;
}
// あるマスに将棋陣営の駒があると仮定して、石を(r,c)に置いたら囲める将棋駒の数
function captureGainIfPlace(r,c){
  // 一時的に石を置いて checkCaptures 相当を判定
  const backup=board[r][c];
  board[r][c]={side:'G',type:'o'};
  const taken=checkCaptures(r,c);
  board[r][c]=backup;
  return taken;
}

/* 敵王の位置を返す（なければnull） */
function findKing(side){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const p=board[r][c]; if(p&&p.side===side&&p.type==='K') return [r,c];
  }
  return null;
}
function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}

/* ---- 将棋陣営CPU（side='S'）の手を選ぶ ---- */
function chooseShogiMove(){
  const mine=piecesOf('S');
  const ek=findKing('I'); // 囲碁の王
  let best=null, bestScore=-1;
  for(const {r,c} of mine){
    for(const [tr,tc] of legalMoves(r,c)){
      const t=board[tr][tc];
      let score=0.1;
      if(t){
        if(t.side==='I'){ score = (t.type==='K')?100000 : 100+PIECE_VAL[t.type]; }
        else if(t.side==='G'){ score = 0.3; }
      }
      if(tr<r) score+=0.05; // 前進(上方向)
      // 敵王へ近づく駒を弱く誘導（玉以外）
      if(ek && board[r][c].type!=='K'){
        const before=dist(r,c,ek[0],ek[1]);
        const after=dist(tr,tc,ek[0],ek[1]);
        if(after<before) score+=0.6;
      }
      score+=Math.random()*0.04;
      if(score>bestScore){ bestScore=score; best={fr:r,fc:c,tr,tc}; }
    }
  }
  return best?{kind:'move',...best}:null;
}

/* ---- 囲碁陣営CPU（side='G'石 + side='I'駒）の手を選ぶ ---- */
function chooseIgoMove(){
  // 候補1：囲碁陣営の駒移動（敵駒/王を取れるなら最優先）
  let best=null, bestScore=-1;
  for(const {r,c} of piecesOf('I')){
    for(const [tr,tc] of legalMoves(r,c)){
      const t=board[tr][tc];
      let score=0.1;
      if(t&&t.side==='S'){ score = (t.type==='K')?100000 : 100+PIECE_VAL[t.type]; }
      if(tr>r) score+=0.05; // 囲碁駒は下方向が前進
      score+=Math.random()*0.04;
      if(score>bestScore){ bestScore=score; best={kind:'move',fr:r,fc:c,tr,tc}; }
    }
  }
  // 候補2：石を置いて将棋駒を囲み取る（取れる枚数×価値）
  for(const [r,c] of emptyCells()){
    const taken=captureGainIfPlace(r,c);
    if(taken.length){
      let val=0, kingHit=false;
      taken.forEach(([tr,tc])=>{ const pc=board[tr][tc]; val+=PIECE_VAL[pc.type]; if(pc.type==='K')kingHit=true; });
      let score=kingHit?100000:(200+val); // 囲み取りは駒移動の取りより優先
      score+=Math.random()*0.04;
      if(score>bestScore){ bestScore=score; best={kind:'place',r,c}; }
    }
  }
  // 候補3：取れる手が無いとき、将棋の駒に隣接する空きマスへ石を置いて包囲を進める
  if(!best || bestScore<1){
    const sk=findKing('S'); // 将棋の玉
    let pScore=-1, pBest=null;
    for(const [r,c] of emptyCells()){
      let adj=0, surroundProgress=0;
      for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=N||nc<0||nc>=N) continue;
        const np=board[nr][nc];
        if(np&&np.side==='S'){ adj++; surroundProgress+=countSurround(nr,nc); }
      }
      if(adj>0){
        let s=adj*2+surroundProgress;
        // 将棋玉に近い場所ほど優先（玉を囲みにいく）
        if(sk) s+=Math.max(0, 6-dist(r,c,sk[0],sk[1]))*0.3;
        s+=Math.random()*0.5;
        if(s>pScore){ pScore=s; pBest={kind:'place',r,c}; }
      }
    }
    if(pBest) best=pBest;
    if(!best){
      const ec=emptyCells();
      if(ec.length){ const [r,c]=ec[Math.floor(Math.random()*ec.length)]; best={kind:'place',r,c}; }
    }
  }
  return best;
}
// (r,c)の将棋駒が今いくつの方向を石/壁で塞がれているか
function countSurround(r,c){
  let n=0;
  for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=N||nc<0||nc>=N){ n++; continue; }
    const t=board[nr][nc];
    if(t&&t.side==='G') n++;
  }
  return n;
}

/* ---- CPUの手を実際に指す ---- */
function cpuPlay(){
  if(!isCPUTurn()) return;
  sel=null; dropSel=null;
  if(turn==='S'){
    const mv=chooseShogiMove();
    if(!mv){ // 指せる手がない → 何もできない（実質詰み）。相手勝ちにする
      finish('G'); return;
    }
    doPieceMove(mv.fr,mv.fc,mv.tr,mv.tc);
  } else {
    const mv=chooseIgoMove();
    if(!mv){ finish('S'); return; }
    if(mv.kind==='move') doPieceMove(mv.fr,mv.fc,mv.tr,mv.tc);
    else doIgoPlace(mv.r,mv.c);
  }
  // 手番継続/相手CPUへの連鎖は各実行関数末尾の scheduleCPU が担う
}
function scheduleCPU(){
  if(isCPUTurn()) setTimeout(cpuPlay, 420); // 少し間を置いて指す
}

/* ---- 履歴(一手戻す) ---- */
function pushHistory(){
  history.push(JSON.stringify({board,turn,igoMovesLeft,captured,setupPhase}));
  if(history.length>80) history.shift();
}
function undo(){
  if(!history.length) return;
  const s=JSON.parse(history.pop());
  board=s.board;turn=s.turn;igoMovesLeft=s.igoMovesLeft;
  captured=s.captured;setupPhase=s.setupPhase;
  gameOver=false; sel=null; dropSel=null; pendingProm=null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('promOverlay').classList.remove('show');
  document.getElementById('setupNote').classList.toggle('hide',!setupPhase);
  updateTurnBar(); render(); setMsg('一手戻しました。');
}

/* ---- 新規対局 ---- */
function newGame(){
  initBoard();
  turn=document.getElementById('firstMove').value; // 'S' or 'G'
  igoMovesPerTurn=parseInt(document.getElementById('igoMoves').value,10);
  igoMovesLeft=igoMovesPerTurn;
  sel=null; history=[]; gameOver=false; dropSel=null; pendingProm=null;
  captured={igoPieces:[],shogiPieces:[]};
  setupPhase=false;
  players={
    S:document.getElementById('shogiPlayer').value,
    G:document.getElementById('igoPlayer').value
  };
  document.getElementById('setupNote').classList.add('hide');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('promOverlay').classList.remove('show');
  updateTurnBar(); sizeCanvas(); render();
  setMsg((turn==='S'?'将棋':'囲碁')+'の先手で開始です。');
  scheduleCPU(); // 先手がCPUなら指し始める
}

document.getElementById('resetBtn').onclick=newGame;
document.getElementById('againBtn').onclick=newGame;
document.getElementById('undoBtn').onclick=undo;
document.getElementById('promYes').onclick=()=>resolvePromotion(true);
document.getElementById('promNo').onclick=()=>resolvePromotion(false);
document.getElementById('igoMoves').onchange=()=>{
  if(!gameOver){ igoMovesPerTurn=parseInt(document.getElementById('igoMoves').value,10);
    setMsg('囲碁の手数を変更しました（次の囲碁番から反映）。'); }
};
window.addEventListener('resize',()=>{sizeCanvas();});
newGame();
</script>
